services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prode_mundial_db}
      POSTGRES_USER: ${POSTGRES_USER:-prode_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?La variable POSTGRES_PASSWORD es obligatoria}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - prode_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prode_user} -d ${POSTGRES_DB:-prode_mundial_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      APP_NAME: ${APP_NAME:-Prode Mundial}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-prode_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-prode_mundial_db}
      SECRET_KEY: ${SECRET_KEY:?La variable SECRET_KEY es obligatoria}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:?La variable BACKEND_CORS_ORIGINS es obligatoria}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prode_network
    ports:
      - "${BACKEND_PORT:-8100}:8100"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?La variable VITE_API_URL es obligatoria}
    restart: unless-stopped
    networks:
      - prode_network
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

volumes:
  postgres_data:

networks:
  prode_network:
    driver: bridge
